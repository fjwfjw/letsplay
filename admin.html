<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <title>后台管理 · LET'S PLAY</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap');

    :root {
      --bg: #07090f;
      --bg-1: #0d1119;
      --bg-2: #141a26;
      --bg-3: #1c2433;
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(255, 255, 255, 0.16);
      --fg: #f3f5f8;
      --fg-dim: #aab2c0;
      --muted: #6b7488;
      --lime: #d4ff3a;
      --coral: #ff5e3a;
      --cyan: #3ad4ff;
      --gold: #ffd23a;
      --font-display: 'Anton', 'Arial Narrow', sans-serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      /* iOS PWA / 添加到主屏后的安全区域：顶部状态栏完整保留，底部 Home Indicator 减少30% */
      padding-top: constant(safe-area-inset-top);
      padding-top: env(safe-area-inset-top);
      padding-bottom: constant(safe-area-inset-bottom);
      padding-bottom: calc(env(safe-area-inset-bottom) * 0.7);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(1000px 500px at 80% -10%, rgba(212, 255, 58, 0.05), transparent 60%),
        linear-gradient(180deg, #07090f 0%, #0a0e17 100%);
    }

    .shell {
      max-width: 1200px;
      margin: 0 auto;
      /* 顶部安全距离由 html, body 的 padding-top 统一提供，这里只留少量呼吸间距 */
      padding: 4px 20px 80px;
    }

    /* ===== Topbar ===== */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 28px;
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .brand .mark {
      font-family: var(--font-display);
      font-size: 24px;
      letter-spacing: 2px;
      color: var(--lime);
      text-transform: uppercase;
    }
    .brand .sub {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .topbar-actions {
      display: flex;
      gap: 8px;
    }
    .btn {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--line-strong);
      background: var(--bg-2);
      color: var(--fg);
      transition: all 0.2s;
    }
    .btn:hover { border-color: var(--lime); color: var(--lime); }
    .btn-primary {
      background: var(--lime);
      color: var(--bg);
      border-color: var(--lime);
      font-weight: 700;
    }
    .btn-primary:hover { opacity: 0.85; color: var(--bg); }

    /* ===== Stats Row ===== */
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--bg-1);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px 24px;
      min-width: 120px;
    }
    .stat-card .label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .stat-card .value {
      font-family: var(--font-display);
      font-size: 28px;
      line-height: 1;
    }
    .stat-card.waiting .value { color: var(--gold); }
    .stat-card.ongoing .value { color: var(--lime); }
    .stat-card.finished .value { color: var(--muted); }
    .stat-card.total .value { color: var(--cyan); }

    /* ===== Room Card ===== */
    .room-list { display: flex; flex-direction: column; gap: 16px; }

    .room-card {
      background: var(--bg-1);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
    }

    .room-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .room-id {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
    }

    .room-status {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 700;
    }
    .room-status.waiting { background: rgba(255,210,58,0.15); color: var(--gold); }
    .room-status.ongoing { background: rgba(212,255,58,0.15); color: var(--lime); }
    .room-status.finished { background: rgba(107,116,136,0.15); color: var(--muted); }

    .room-type {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--fg-dim);
    }

    .room-meta {
      margin-left: auto;
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }
    .room-meta b { color: var(--fg); font-weight: 600; }

    /* ===== Players ===== */
    .room-players {
      padding: 12px 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--line);
    }
    .player-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 4px 12px 4px 4px;
    }
    .player-chip .ava {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--bg-3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .player-chip .ava svg { width: 100%; height: 100%; }
    .player-chip .name {
      font-size: 12px;
      font-weight: 500;
    }
    .player-chip.creator {
      border-color: var(--lime);
    }
    .player-chip.creator .name {
      color: var(--lime);
    }

    /* ===== Matches Table ===== */
    .room-matches {
      padding: 12px 20px 16px;
      overflow-x: auto;
    }
    .matches-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .matches-table th {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }
    .matches-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }
    .matches-table tr:last-child td { border-bottom: none; }

    .team-cell {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .team-cell .ava {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
    }
    .team-cell .ava svg { width: 100%; height: 100%; }
    .team-cell .names {
      font-size: 12px;
    }

    .score-cell {
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
    }
    .score-cell .a { color: var(--cyan); }
    .score-cell .b { color: var(--coral); }
    .score-cell .sep { color: var(--muted); margin: 0 4px; }

    .match-status {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .match-status.pending { background: rgba(107,116,136,0.15); color: var(--muted); }
    .match-status.live { background: rgba(212,255,58,0.15); color: var(--lime); }
    .match-status.done { background: rgba(255,94,58,0.1); color: var(--coral); }

    .games-detail {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--fg-dim);
    }

    /* ===== Empty ===== */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-state .big {
      font-family: var(--font-display);
      font-size: 24px;
      letter-spacing: 1px;
      margin-bottom: 8px;
      color: var(--fg-dim);
    }

    /* ===== Loading ===== */
    .loading-bar {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 13px;
    }

    /* ===== Auto-refresh indicator ===== */
    .refresh-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
    }
    .refresh-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--lime);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ===== Back link ===== */
    .back-link {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      font-family: var(--font-mono);
    }
    .back-link:hover { color: var(--lime); }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Topbar -->
    <div class="topbar">
      <div class="brand">
        <span class="mark">LET'S PLAY</span>
        <span class="sub">Admin Panel</span>
      </div>
      <div class="topbar-actions">
        <div class="refresh-indicator" id="refreshIndicator">
          <span class="refresh-dot"></span>
          <span id="refreshText">自动刷新 10s</span>
        </div>
        <button class="btn" id="refreshBtn">刷新</button>
        <a href="https://fjwfjw.github.io/letsplay/" class="back-link">← 返回首页</a>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card total">
        <div class="label">总房间</div>
        <div class="value" id="statTotal">—</div>
      </div>
      <div class="stat-card waiting">
        <div class="label">等待中</div>
        <div class="value" id="statWaiting">—</div>
      </div>
      <div class="stat-card ongoing">
        <div class="label">进行中</div>
        <div class="value" id="statOngoing">—</div>
      </div>
      <div class="stat-card finished">
        <div class="label">已结束</div>
        <div class="value" id="statFinished">—</div>
      </div>
    </div>

    <!-- Room List -->
    <div class="room-list" id="roomList">
      <div class="loading-bar">加载中…</div>
    </div>
  </div>

  <script>
    // ===== API =====
    const API_BASE = location.hostname.includes('github.io')
      ? 'https://pve.u2170167.nyat.app:38412'
      : '';

    async function fetchBattles() {
      const res = await fetch(API_BASE + '/api/admin/battles');
      if (!res.ok) throw new Error('请求失败');
      return res.json();
    }

    // ===== Utils =====
    function timeAgo(ts) {
      if (!ts) return '—';
      const diff = Math.floor(Date.now() / 1000) - ts;
      if (diff < 60) return diff + '秒前';
      if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
      if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
      return Math.floor(diff / 86400) + '天前';
    }

    function statusLabel(s) {
      return { waiting: '等待中', ongoing: '进行中', finished: '已结束' }[s] || s;
    }

    function matchStatusLabel(s) {
      return { pending: '未开始', live: '进行中', done: '已结束' }[s] || s;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function teamNamesHTML(players) {
      if (!players || !players.length) return '<span class="names" style="color:var(--muted)">—</span>';
      const names = players.map(p => escapeHtml(p.nickname || p.id)).join(' / ');
      const avas = players.map(p => p.avatar || '').join('');
      return `<div class="team-cell"><div class="ava">${avas}</div><span class="names">${names}</span></div>`;
    }

    function gamesDetailHTML(match) {
      const gd = match.games_detail || [];
      if (!gd.length) return '<span style="color:var(--muted)">—</span>';
      return gd.map((g, i) =>
        `<span style="margin-right:8px;">G${i+1}: <b style="color:var(--cyan)">${g.score_a}</b>-<b style="color:var(--coral)">${g.score_b}</b></span>`
      ).join('');
    }

    // ===== Render =====
    function renderStats(battles) {
      const stats = { total: battles.length, waiting: 0, ongoing: 0, finished: 0 };
      battles.forEach(b => { stats[b.status] = (stats[b.status] || 0) + 1; });
      document.getElementById('statTotal').textContent = stats.total;
      document.getElementById('statWaiting').textContent = stats.waiting;
      document.getElementById('statOngoing').textContent = stats.ongoing;
      document.getElementById('statFinished').textContent = stats.finished;
    }

    function renderRoom(battle) {
      const players = battle.players || [];
      const matches = battle.matches || [];

      // Players
      const playersHTML = players.map(p => {
        const isCreator = p.id === battle.creator_id;
        return `<div class="player-chip ${isCreator ? 'creator' : ''}">
          <div class="ava">${p.avatar || ''}</div>
          <span class="name">${escapeHtml(p.nickname || p.id)}</span>
        </div>`;
      }).join('');

      // Matches table
      let matchesHTML = '';
      if (matches.length) {
        matchesHTML = `
          <table class="matches-table">
            <thead>
              <tr>
                <th>#</th>
                <th>队伍 A</th>
                <th>队伍 B</th>
                <th>比分</th>
                <th>局数</th>
                <th>各局详情</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody>
              ${matches.map(m => `
                <tr>
                  <td style="color:var(--muted);font-family:var(--font-mono);">${m.index}</td>
                  <td>${teamNamesHTML(m.team_a_players)}</td>
                  <td>${teamNamesHTML(m.team_b_players)}</td>
                  <td class="score-cell">
                    <span class="a">${m.score_a}</span><span class="sep">:</span><span class="b">${m.score_b}</span>
                  </td>
                  <td style="font-family:var(--font-mono);">
                    <span style="color:var(--cyan)">${m.game_a}</span> - <span style="color:var(--coral)">${m.game_b}</span>
                  </td>
                  <td class="games-detail">${gamesDetailHTML(m)}</td>
                  <td><span class="match-status ${m.status}">${matchStatusLabel(m.status)}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } else {
        matchesHTML = '<div style="padding:12px;color:var(--muted);font-size:12px;">尚未开始编排</div>';
      }

      return `
        <div class="room-card">
          <div class="room-header">
            <span class="room-id">#${escapeHtml(battle.id)}</span>
            <span class="room-status ${battle.status}">${statusLabel(battle.status)}</span>
            <span class="room-type">${battle.type === 'singles' ? '单打' : '双打'}</span>
            <div class="room-meta">
              <span><b>${battle.players_count}</b>/${battle.max_players} 人</span>
              <span><b>${battle.total_matches}</b> 场</span>
              <span>${battle.best_of === 1 ? '一局定胜负' : '三局两胜'}</span>
              <span>${battle.game_point} 分制</span>
              <span>创建: ${timeAgo(battle.created_at)}</span>
              ${battle.finished_at ? `<span>结束: ${timeAgo(battle.finished_at)}</span>` : ''}
            </div>
          </div>
          <div class="room-players">${playersHTML || '<span style="color:var(--muted);font-size:12px;">无玩家</span>'}</div>
          <div class="room-matches">${matchesHTML}</div>
        </div>
      `;
    }

    function render(battles) {
      renderStats(battles);
      const container = document.getElementById('roomList');
      if (!battles.length) {
        container.innerHTML = '<div class="empty-state"><div class="big">暂无对战房间</div><div>创建的房间会显示在这里</div></div>';
        return;
      }
      container.innerHTML = battles.map(renderRoom).join('');
    }

    // ===== Load =====
    async function load() {
      try {
        const data = await fetchBattles();
        render(data.battles || []);
      } catch (e) {
        document.getElementById('roomList').innerHTML =
          `<div class="empty-state"><div class="big">加载失败</div><div>${escapeHtml(e.message)}</div></div>`;
      }
    }

    // ===== Auto refresh =====
    let countdown = 10;
    function tick() {
      countdown--;
      if (countdown <= 0) {
        countdown = 10;
        load();
      }
      document.getElementById('refreshText').textContent = `自动刷新 ${countdown}s`;
    }

    document.getElementById('refreshBtn').addEventListener('click', () => {
      countdown = 10;
      load();
    });

    load();
    setInterval(tick, 1000);
  </script>
</body>
</html>
