<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="application-name" content="LET'S PLAY" />
  <meta name="description" content="在线羽毛球对战记分" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-title" content="LET'S PLAY" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#07090f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>对战大厅 · LET'S PLAY</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon-180x180.png" />
  <link rel="stylesheet" href="css/style.css?v=10" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="mark">LET'S PLAY</span>
        <span class="sub">Battle Lobby</span>
      </div>
      <div class="user-chip" id="userChip">
        <div class="ava"><span class="loading"></span></div>
        <span class="name">加载中</span>
      </div>
    </header>

    <!-- 状态条 -->
    <div class="status-bar" id="statusBar">
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
        <div>
          <span class="live-dot"></span>
          <span id="statusText" style="font-weight:600;letter-spacing:.5px;">等待玩家加入</span>
        </div>
        <div class="count-pill">
          <span class="big" id="pCount">0</span>
          <span class="small">/<span id="pMax">0</span> 人</span>
        </div>
        <div class="muted" id="typeTag" style="font-family:var(--font-mono);font-size:12px;letter-spacing:1px;text-transform:uppercase;"></div>
      </div>
      <div class="muted" id="matchesTag" style="font-family:var(--font-mono);font-size:12px;letter-spacing:1px;text-transform:uppercase;"></div>
    </div>

    <!-- 分享区（仅创建者可见） -->
    <section class="panel hidden" id="sharePanel">
      <div class="panel-head">
        <h2>邀请对战</h2>
        <span class="tag">Share</span>
      </div>
      <p class="muted" style="margin-bottom:14px;">把链接发给朋友，他们打开即可加入这场对战。</p>
      <div class="share-box">
        <span class="link" id="shareLink">—</span>
        <button class="copy" id="copyBtn">复制</button>
      </div>
    </section>

    <!-- 分配方式（仅创建者可见） -->
    <section class="panel hidden" id="assignPanel" style="margin-top:20px;">
      <div class="panel-head">
        <h2>分配方式</h2>
        <span class="tag">Assign</span>
      </div>
      <div class="type-grid" id="assignGrid">
        <div class="type-card selected" data-mode="random">
          <div class="ico">🎲</div>
          <div class="label">随机分配</div>
          <div class="desc">系统均匀分配队友与对手，人人上场</div>
          <div class="check">✓</div>
        </div>
        <div class="type-card" data-mode="free">
          <div class="ico">🤝</div>
          <div class="label">自由对战</div>
          <div class="desc">自己组队，按自定义队伍对战</div>
          <div class="check">✓</div>
        </div>
      </div>

      <!-- 性别规则（仅随机分配时可见） -->
      <div class="hidden" id="genderRulePanel" style="margin-top:18px;">
        <div class="field-label" style="margin-bottom:10px;">
          <span class="name">性别规则</span>
          <span class="val muted" id="genderRuleHint" style="font-size:11px;letter-spacing:0.5px;">人數不足時自動降級為普通</span>
        </div>
        <div class="chip-row" id="genderRuleChips"></div>
      </div>

      <!-- 自由组队面板 -->
      <div class="hidden" id="teamsPanel" style="margin-top:18px;">
        <div class="field-label" style="margin-bottom:10px;">
          <span class="name">队伍编排</span>
          <span class="val muted" id="teamsHint">点击玩家分配到队伍，再点移出</span>
        </div>
        <!-- 队伍数量控制 -->
        <div class="btn-row" style="margin-bottom:14px;">
          <button class="btn btn-ghost" id="teamMinusBtn">－ 队伍</button>
          <span class="val" id="teamCountVal" style="min-width:60px;text-align:center;">2</span>
          <button class="btn btn-ghost" id="teamPlusBtn">＋ 队伍</button>
        </div>
        <!-- 未分配玩家池 -->
        <div class="field-label" style="margin-bottom:8px;">
          <span class="name">未分配玩家</span>
          <span class="val" id="poolCount">0</span>
        </div>
        <div class="players stagger" id="playerPool" style="margin-bottom:16px;"></div>
        <!-- 各队伍 -->
        <div id="teamsList"></div>
        <button class="btn btn-ghost btn-block" id="saveTeamsBtn" style="margin-top:14px;">保存队伍配置</button>
      </div>
    </section>

    <!-- 玩家列表 -->
    <section class="panel" style="margin-top:20px;">
      <div class="panel-head">
        <h2>参赛玩家</h2>
        <span class="tag" id="pCountTag">0 / 0</span>
      </div>
      <div class="players stagger" id="playersList"></div>
      <div class="empty hidden" id="emptyPlayers">
        <div class="big">还没有玩家</div>
        <div>等待加入…</div>
      </div>
    </section>

    <!-- 操作按钮 -->
    <div class="btn-row" id="actionRow" style="flex-direction:column;align-items:stretch;">
      <!-- 未加入：显示加入按钮 -->
      <button class="btn btn-primary btn-block hidden" id="joinBtn">加入对战</button>
      <!-- 创建者：开始按钮 -->
      <button class="btn btn-primary btn-block hidden" id="startBtn">开始对战 →</button>
      <!-- 已加入等待 -->
      <div class="center muted hidden" id="waitNote" style="padding:14px;font-size:13px;letter-spacing:1px;">
        已加入，等待创建者开赛…
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/lobby.js"></script>
</body>
</html>
