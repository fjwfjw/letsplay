<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="application-name" content="LET'S PLAY">
<meta name="description" content="在线羽毛球对战记分">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-title" content="记分">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07090f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>记分 · LET'S PLAY</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon-watch.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-overflow-scrolling: none;
    background: #000;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", "PingFang SC", sans-serif;
    position: fixed;
    inset: 0;
    /* iOS PWA / 添加到主屏后的安全区域：状态栏/灵动岛让位（高度减少30%） */
    padding-top: constant(safe-area-inset-top);
    padding-top: calc(env(safe-area-inset-top) * 0.7);
    padding-bottom: constant(safe-area-inset-bottom);
    padding-bottom: calc(env(safe-area-inset-bottom) * 0.7);
  }
  body { transform: translateZ(0); }

  /* 加载/错误态 */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000; color: #fff;
    padding: 20px; text-align: center;
  }
  .screen .spinner {
    width: 28px; height: 28px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .screen .msg { font-size: 13px; color: rgba(255,255,255,0.7); letter-spacing: 1px; }
  .screen .big { font-size: 18px; font-weight: 700; margin-bottom: 8px; }

  /* 记分板 - 参考 badmintonScoring 纯净风格 */
  .scoreboard {
    display: none;
    flex-direction: column;
    width: 100vw; height: 100vh;
    height: 100dvh;
    position: fixed; inset: 0;
    overflow: hidden;
  }
  .scoreboard.ready { display: flex; }

  .score-block {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }
  .blue { background-color: #007AFF; }
  .red  { background-color: #FF3B30; }

  /* 发球指示 - 边缘发光条 */
  .serve-edge {
    position: absolute;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .blue .serve-edge { right: 0; top: 0; bottom: 0; width: 3px; background: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.8); }
  .red  .serve-edge { left: 0; top: 0; bottom: 0; width: 3px; background: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.8); }
  .serving .serve-edge { opacity: 1; animation: blink 1.2s ease-in-out infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* 分数 */
  .score-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
  .score {
    font-size: clamp(48px, 24vw, 88px);
    font-weight: 700;
    color: #fff;
    line-height: 1;
    text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    font-variant-numeric: tabular-nums;
  }

  /* 队员名单 - 显示在色块靠近中间线位置 */
  .team-players {
    position: absolute;
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.92);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    z-index: 2;
    padding: 0 14px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.35);
    pointer-events: none;
    line-height: 1.35;
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: center;
    justify-content: center;
  }
  .team-players .player {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .blue .team-players { bottom: 15%; }
  .red  .team-players { top: 15%; }

  /* 得分弹跳 - 参考 badmintonScoring 多段弹性 */
  @keyframes scorePop {
    0%   { transform: scale(1); }
    20%  { transform: scale(1.5); }
    40%  { transform: scale(0.9); }
    60%  { transform: scale(1.15); }
    80%  { transform: scale(0.97); }
    100% { transform: scale(1); }
  }
  .score-pop { animation: scorePop 0.4s cubic-bezier(0.22, 1, 0.36, 1); }

  /* 减分挤压 */
  @keyframes scoreSqueeze {
    0%   { transform: scaleX(1) scaleY(1); }
    15%  { transform: scaleX(0.5) scaleY(1.3); }
    30%  { transform: scaleX(1.4) scaleY(0.8); }
    45%  { transform: scaleX(0.85) scaleY(1.1); }
    60%  { transform: scaleX(1.1) scaleY(0.95); }
    75%  { transform: scaleX(0.97) scaleY(1.02); }
    100% { transform: scaleX(1) scaleY(1); }
  }
  .score-squeeze { animation: scoreSqueeze 0.5s cubic-bezier(0.22, 1, 0.36, 1); }

  /* 冲击波 */
  @keyframes ripple {
    0% { transform: scale(0); opacity: 0.6; }
    100% { transform: scale(4); opacity: 0; }
  }
  .ripple {
    position: absolute;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    pointer-events: none;
    z-index: 1;
    animation: ripple 0.5s ease-out forwards;
  }

  /* +1/-1 浮字 */
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
  }
  .float-text {
    position: absolute;
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    pointer-events: none;
    z-index: 3;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    animation: floatUp 0.7s ease-out forwards;
  }

  /* 粒子爆发 - 参考 badmintonScoring */
  @keyframes particle {
    0%   { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    pointer-events: none;
    z-index: 3;
    animation: particle 0.6s ease-out forwards;
  }

  /* 火花粒子（减分用） */
  @keyframes spark {
    0%   { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0) rotate(180deg); }
  }
  .spark {
    position: absolute;
    border-radius: 2px;
    background: #FFD60A;
    pointer-events: none;
    z-index: 3;
    animation: spark 0.5s ease-out forwards;
  }

  /* 色块按压脉冲 */
  @keyframes blockPulse {
    0%   { filter: brightness(1); }
    50%  { filter: brightness(0.85); }
    100% { filter: brightness(1); }
  }
  .block-pulse { animation: blockPulse 0.15s ease-out; }

  /* 长按进度环 */
  .progress-ring {
    position: absolute;
    z-index: 2;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .progress-ring.active { opacity: 1; }
  .progress-ring circle {
    fill: none;
    stroke-linecap: round;
  }
  .progress-ring .ring-bg { stroke: rgba(255,255,255,0.2); }
  .progress-ring .ring-fg {
    stroke: #fff;
    transition: stroke-dashoffset 0.05s linear;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.6));
  }

  /* 进度环完成脉冲 */
  @keyframes ringPulse {
    0%   { transform: scale(1); opacity: 1; }
    50%  { transform: scale(1.3); opacity: 0.6; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  .ring-pulse {
    position: absolute;
    border-radius: 50%;
    border: 3px solid #fff;
    pointer-events: none;
    z-index: 2;
    animation: ringPulse 0.4s ease-out forwards;
  }

  /* 大比分胶囊 - 悬浮在蓝红交界处 */
  .games-display {
    position: fixed;
    top: 50%; left: 70%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff;
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    border: 1px solid rgba(255,255,255,0.2);
    white-space: nowrap;
    box-shadow: 0 2px 16px rgba(0,0,0,0.5);
    z-index: 10;
  }

  /* 比赛结束遮罩 */
  .match-over {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 50;
    color: #fff;
    text-align: center;
    padding: 20px;
  }
  .match-over.show { display: flex; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .match-over .crown {
    font-size: 10px;
    letter-spacing: 3px;
    color: #FFD60A;
    margin-bottom: 10px;
  }
  .match-over .winner {
    font-size: 18px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 10px;
  }
  .match-over .final {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    font-variant-numeric: tabular-nums;
  }
  .match-over .close-hint {
    position: absolute;
    bottom: 16px;
    font-size: 9px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }

  /* 上滑退出把手 */
  .swipe-up-bar {
    position: fixed;
    /* iOS Home Indicator 让位 */
    bottom: calc(4px + env(safe-area-inset-bottom, 0px) * 0.7);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    z-index: 30;
    pointer-events: auto;
    cursor: grab;
    opacity: 0.5;
    transition: opacity 0.2s;
    touch-action: none;
    padding: 6px 14px;
  }
  .swipe-up-bar:active { cursor: grabbing; }
  .swipe-up-bar .handle {
    width: 32px; height: 3px;
    border-radius: 100px;
    background: rgba(255,255,255,0.85);
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  .swipe-up-bar .label {
    font-size: 7px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.85);
    text-transform: uppercase;
    font-weight: 600;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }
  .swiping .swipe-up-bar { opacity: 0.95; }
</style>
</head>
<body>

<!-- 加载/错误屏 -->
<div class="screen" id="loadScreen">
  <div class="spinner"></div>
  <div class="msg">加载比赛…</div>
</div>

<!-- 记分板 -->
<div class="scoreboard" id="scoreboard">
  <div class="score-block blue" id="blue">
    <div class="serve-edge"></div>
    <div class="team-players" id="bluePlayers"></div>
    <div class="score-wrapper">
      <svg class="progress-ring" width="90" height="90" viewBox="0 0 120 120">
        <circle class="ring-bg" cx="60" cy="60" r="52" stroke-width="6"/>
        <circle class="ring-fg" cx="60" cy="60" r="52" stroke-width="6"
          stroke-dasharray="326.73" stroke-dashoffset="326.73"
          transform="rotate(-90 60 60)"/>
      </svg>
      <span class="score" id="blueScore">0</span>
    </div>
  </div>

  <div class="score-block red" id="red">
    <div class="serve-edge"></div>
    <div class="team-players" id="redPlayers"></div>
    <div class="score-wrapper">
      <svg class="progress-ring" width="90" height="90" viewBox="0 0 120 120">
        <circle class="ring-bg" cx="60" cy="60" r="52" stroke-width="6"/>
        <circle class="ring-fg" cx="60" cy="60" r="52" stroke-width="6"
          stroke-dasharray="326.73" stroke-dashoffset="326.73"
          transform="rotate(-90 60 60)"/>
      </svg>
      <span class="score" id="redScore">0</span>
    </div>
  </div>
</div>

<!-- 大比分胶囊 -->
<div class="games-display" id="gamesDisplay">0 : 0</div>

<!-- 上滑退出把手 -->
<div class="swipe-up-bar" id="swipeUpBar">
  <div class="handle"></div>
  <div class="label">上滑退出</div>
</div>

<!-- 比赛结束 -->
<div class="match-over" id="matchOver">
  <div class="crown">★ WINNER ★</div>
  <div class="winner" id="overWinner">—</div>
  <div class="final" id="overFinal">—</div>
  <div class="close-hint">点击任意位置关闭</div>
</div>

<script>
// 阻止页面滚动（Apple Watch / iOS）
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// 禁用 iOS / watchOS 双指捏合与双击缩放
['gesturestart', 'gesturechange', 'gestureend', 'dblclick'].forEach(evt => {
  document.addEventListener(evt, e => e.preventDefault(), { passive: false });
});
// watchOS / iOS Safari 双击放大：全局 touchstart 阻止默认行为（touchend 同理），彻底取消双击缩放
document.addEventListener('touchstart', e => {
  e.preventDefault();
}, { passive: false });

const MID = new URLSearchParams(location.search).get('m');
const RING_C = 2 * Math.PI * 52; // ~326.73
const LONG_PRESS_MS = 1200;

const blueEl = document.getElementById('blue');
const redEl  = document.getElementById('red');
const blueScoreEl = document.getElementById('blueScore');
const redScoreEl  = document.getElementById('redScore');
const blueRing = blueEl.querySelector('.progress-ring');
const redRing  = redEl.querySelector('.progress-ring');
const blueRingFg = blueRing.querySelector('.ring-fg');
const redRingFg  = redRing.querySelector('.ring-fg');

let match = null;

// GitHub Pages 部署时 API 指向后端服务器；本地开发时用相对路径
const API_BASE = location.hostname.includes('github.io')
  ? 'https://pve.u2170167.nyat.app:38412'
  : '';

async function apiScore(action) {
  const res = await fetch(`${API_BASE}/api/match/${MID}/score`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action }),
  });
  if (!res.ok) throw new Error('请求失败');
  return res.json();
}
async function apiGet() {
  const res = await fetch(`${API_BASE}/api/match/${MID}`);
  if (!res.ok) throw new Error('对战不存在');
  return res.json();
}

async function init() {
  if (!MID) {
    showScreen('缺少比赛 ID', true);
    return;
  }
  try {
    match = await apiGet();
    document.getElementById('loadScreen').style.display = 'none';
    document.getElementById('scoreboard').classList.add('ready');
    render();
    setInterval(sync, 2500);
  } catch (e) {
    showScreen(e.message || '加载失败', true);
  }
}

async function sync() {
  try {
    const fresh = await apiGet();
    const changed = fresh.score_a !== match.score_a || fresh.score_b !== match.score_b ||
                    fresh.game_a !== match.game_a || fresh.game_b !== match.game_b ||
                    fresh.status !== match.status;
    if (changed) {
      match = fresh;
      render();
    }
  } catch {}
}

function showScreen(msg, isError) {
  const s = document.getElementById('loadScreen');
  s.innerHTML = `<div class="big">${isError ? '⚠' : ''}</div><div class="msg">${msg}</div>`;
}

function render() {
  document.getElementById('gamesDisplay').textContent = `${match.game_a} : ${match.game_b}`;
  blueScoreEl.textContent = match.score_a;
  redScoreEl.textContent  = match.score_b;

  // 队员名单 - 每人一行
  const bluePlayersEl = document.getElementById('bluePlayers');
  const redPlayersEl = document.getElementById('redPlayers');
  bluePlayersEl.innerHTML = (match.team_a_players || []).map(p => `<div class="player">${p.nickname}</div>`).join('');
  redPlayersEl.innerHTML = (match.team_b_players || []).map(p => `<div class="player">${p.nickname}</div>`).join('');

  // 发球指示
  blueEl.classList.toggle('serving', match.server === 'a' && match.status !== 'done');
  redEl.classList.toggle('serving', match.server === 'b' && match.status !== 'done');

  // 比赛结束
  if (match.status === 'done') {
    const winnerSide = match.game_a > match.game_b ? 'a' : 'b';
    const winnerName = winnerSide === 'a' ? '队 A 获胜' : '队 B 获胜';
    document.getElementById('overWinner').textContent = winnerName;
    document.getElementById('overFinal').textContent = `${match.game_a} : ${match.game_b}`;
    document.getElementById('matchOver').classList.add('show');
  } else {
    document.getElementById('matchOver').classList.remove('show');
  }
}

// ---------- 动画（参考 badmintonScoring） ----------
function createRipple(block, x, y) {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = (x - 24) + 'px';
  r.style.top = (y - 24) + 'px';
  block.appendChild(r);
  setTimeout(() => r.remove(), 500);
}

function createFloatText(block, text, x, y) {
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.left = (x - 10) + 'px';
  el.style.top = (y - 30) + 'px';
  block.appendChild(el);
  setTimeout(() => el.remove(), 700);
}

function createParticles(block, x, y, count) {
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.5;
    const dist = 25 + Math.random() * 40;
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
    const size = 3 + Math.random() * 5;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    block.appendChild(p);
    setTimeout(() => p.remove(), 600);
  }
}

function createSparks(block, x, y, count) {
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.8;
    const dist = 15 + Math.random() * 30;
    s.style.left = x + 'px';
    s.style.top = y + 'px';
    s.style.setProperty('--px', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--py', Math.sin(angle) * dist + 'px');
    s.style.width = '3px';
    s.style.height = '10px';
    s.style.transform = `rotate(${Math.random() * 360}deg)`;
    block.appendChild(s);
    setTimeout(() => s.remove(), 500);
  }
}

function triggerBlockPulse(block) {
  block.classList.remove('block-pulse');
  void block.offsetWidth;
  block.classList.add('block-pulse');
  setTimeout(() => block.classList.remove('block-pulse'), 150);
}

function popUp(scoreEl) {
  scoreEl.classList.remove('score-pop');
  void scoreEl.offsetWidth;
  scoreEl.classList.add('score-pop');
}

function squeeze(scoreEl) {
  scoreEl.classList.remove('score-squeeze');
  void scoreEl.offsetWidth;
  scoreEl.classList.add('score-squeeze');
}

// ---------- 记分操作 ----------
async function doScore(side) {
  if (match.status === 'done') return;
  try {
    match = await apiScore(side === 'a' ? 'point_a' : 'point_b');
    render();
    const block = side === 'a' ? blueEl : redEl;
    const scoreEl = side === 'a' ? blueScoreEl : redScoreEl;
    const rect = block.getBoundingClientRect();
    const cx = rect.width / 2;
    const cy = rect.height / 2;
    popUp(scoreEl);
    createRipple(block, cx, cy);
    createFloatText(block, '+1', cx, cy);
    createParticles(block, cx, cy, 8);
    triggerBlockPulse(block);
  } catch (e) {}
}

async function doUndo() {
  try {
    match = await apiScore('undo');
    render();
    squeeze(blueScoreEl);
    squeeze(redScoreEl);
    // 火花效果
    [blueEl, redEl].forEach(block => {
      const rect = block.getBoundingClientRect();
      createSparks(block, rect.width / 2, rect.height / 2, 6);
    });
  } catch (e) {}
}

// ---------- 交互：点击得分 + 长按撤销 ----------
// 在 Apple Watch / iOS 上 pointer 事件无法阻止系统双击放大，改用 touch 事件并在
// touchstart / touchend 里 e.preventDefault() 彻底取消默认行为。
function bindBlock(block, side, ring, ringFg) {
  let timer = null;
  let ringTimer = null;
  let longPressed = false;
  let cancelled = false;  // 任何形式的取消（长按达成 / 超阈值移动 / 系统中断）都置 true，touchend 不再 +1
  let startTime = 0;
  let startX = 0, startY = 0;
  let activeTouchId = null;

  function getTouch(e) {
    if (activeTouchId == null) return null;
    for (const t of e.changedTouches) {
      if (t.identifier === activeTouchId) return t;
    }
    return null;
  }

  block.addEventListener('touchstart', (e) => {
    if (activeTouchId != null) return;  // 只处理第一根手指（第二根忽略）
    e.preventDefault();
    const t = e.changedTouches[0];
    activeTouchId = t.identifier;
    longPressed = false;
    cancelled = false;
    startTime = Date.now();
    startX = t.clientX;
    startY = t.clientY;
    ringTimer = setTimeout(() => {
      ring.classList.add('active');
    }, 250);
    timer = setTimeout(() => {
      longPressed = true;
      cancelled = true;  // 长按撤销达成，touchend 不再 +1
      ring.classList.remove('active');
      ringFg.style.strokeDashoffset = RING_C;
      doUndo();
      if (navigator.vibrate) navigator.vibrate(30);
    }, LONG_PRESS_MS);
    animateRing(ringFg);
  }, { passive: false });

  block.addEventListener('touchmove', (e) => {
    const t = getTouch(e);
    if (!t) return;
    if (Math.abs(t.clientX - startX) > 25 || Math.abs(t.clientY - startY) > 25) cancel();
  }, { passive: false });

  block.addEventListener('touchend', (e) => {
    const t = getTouch(e);
    if (!t) return;
    e.preventDefault();
    // 先判定是否要 +1，再 cancel（cancel 会把 cancelled 置 true，否则永远不触发 doScore）
    const shouldScore = !cancelled && !longPressed && Date.now() - startTime < LONG_PRESS_MS;
    cancel();
    if (shouldScore) {
      doScore(side);
      if (navigator.vibrate) navigator.vibrate(10);
    }
    activeTouchId = null;
  }, { passive: false });

  block.addEventListener('touchcancel', (e) => {
    if (getTouch(e)) {
      cancel();
      activeTouchId = null;
    }
  });

  function cancel() {
    cancelled = true;  // 任何 cancel 都置 true，touchend 不会 +1
    if (timer) { clearTimeout(timer); timer = null; }
    if (ringTimer) { clearTimeout(ringTimer); ringTimer = null; }
    ring.classList.remove('active');
    ringFg.style.transition = 'none';
    ringFg.style.strokeDashoffset = RING_C;
    setTimeout(() => { ringFg.style.transition = ''; }, 50);
  }
}

function animateRing(ringFg) {
  ringFg.style.transition = 'none';
  ringFg.style.strokeDashoffset = RING_C;
  setTimeout(() => {
    ringFg.style.transition = `stroke-dashoffset ${LONG_PRESS_MS}ms linear`;
    ringFg.style.strokeDashoffset = '0';
  }, 20);
}

bindBlock(blueEl, 'a', blueRing, blueRingFg);
bindBlock(redEl, 'b', redRing, redRingFg);

// ---------- 上滑退出 ----------
const swipeBar = document.getElementById('swipeUpBar');
let swipeDrag = null;
const SWIPE_THRESHOLD = 80;
let swipeTouchId = null;

function getSwipeTouch(e) {
  if (swipeTouchId == null) return null;
  for (const t of e.changedTouches) {
    if (t.identifier === swipeTouchId) return t;
  }
  return null;
}

swipeBar.addEventListener('touchstart', (e) => {
  if (swipeTouchId != null) return;
  e.preventDefault();
  e.stopPropagation();
  const t = e.changedTouches[0];
  swipeTouchId = t.identifier;
  swipeDrag = { startY: t.clientY };
  document.body.style.transition = 'none';
}, { passive: false });

swipeBar.addEventListener('touchmove', (e) => {
  const t = getSwipeTouch(e);
  if (!t || !swipeDrag) return;
  const dy = t.clientY - swipeDrag.startY;
  if (dy < 0) {
    document.body.classList.add('swiping');
    document.body.style.transform = `translateY(${dy}px)`;
  }
}, { passive: false });

swipeBar.addEventListener('touchend', (e) => {
  const t = getSwipeTouch(e);
  if (!t || !swipeDrag) return;
  e.preventDefault();
  const dy = t.clientY - swipeDrag.startY;
  document.body.classList.remove('swiping');
  if (dy < -SWIPE_THRESHOLD) {
    document.body.style.transition = 'transform 0.35s cubic-bezier(0.4, 0, 1, 1)';
    document.body.style.transform = 'translateY(-100%)';
    setTimeout(exitToScoring, 320);
  } else {
    document.body.style.transition = 'transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1)';
    document.body.style.transform = '';
    setTimeout(() => { document.body.style.transition = ''; }, 260);
  }
  swipeDrag = null;
  swipeTouchId = null;
}, { passive: false });

swipeBar.addEventListener('touchcancel', (e) => {
  if (getSwipeTouch(e) && swipeDrag) {
    document.body.classList.remove('swiping');
    document.body.style.transition = 'transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1)';
    document.body.style.transform = '';
    setTimeout(() => { document.body.style.transition = ''; }, 260);
    swipeDrag = null;
    swipeTouchId = null;
  }
});

function exitToScoring() {
  if (match && match.battle_id) {
    location.href = `matches.html?id=${match.battle_id}`;
  } else {
    location.href = 'index.html';
  }
}

// 关闭结束遮罩（全局 touchstart preventDefault 会导致 click 不触发，改用 touchend）
const matchOverEl = document.getElementById('matchOver');
matchOverEl.addEventListener('click', () => { matchOverEl.classList.remove('show'); });
matchOverEl.addEventListener('touchend', (e) => { e.preventDefault(); matchOverEl.classList.remove('show'); }, { passive: false });

init();
</script>
</body>
